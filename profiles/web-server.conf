# linux-security — web-server profile
#
# Full stack: core hardening + Apache/PHP/MySQL hardening.
# Requires Apache 2.4 running. Optionally hardens PHP and MySQL/MariaDB
# if installed. Requires config.web.env alongside config.env.
#
# This is the default profile (back-compatible with vps-security <= 0.9.0).
#
# Usage:
#   bash bootstrap.sh                      # defaults to web-server
#   bash bootstrap.sh --profile web-server

