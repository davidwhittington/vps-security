name: Lint

on:
  push:
    paths:
      - '**.sh'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.sh'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -name '*.sh' \
            -not -path './.git/*' \
            -not -path './private/*' \
            | sort \
            | xargs shellcheck --severity=warning

  syntax:
    name: bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          find . -name '*.sh' \
            -not -path './.git/*' \
            -not -path './private/*' \
            | sort \
            | while read -r f; do
                echo "Checking: $f"
                bash -n "$f" || exit 1
              done
